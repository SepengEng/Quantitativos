name: Atualizar SINAPI Bahia

on:
  schedule:
    - cron: '0 6 20 * *'  # Todo dia 20 do mês às 06:00 UTC
  workflow_dispatch:       # Permite rodar manualmente também

jobs:
  update-sinapi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install axios xlsx adm-zip --prefix /tmp/sinapi

      - name: Baixar e processar SINAPI BA
        run: node scripts/fetch-sinapi.js
        env:
          NODE_PATH: /tmp/sinapi/node_modules

      - name: Commit e push se houver mudanças
        run: |
          git config user.email "sinapi-bot@quantitativos.app"
          git config user.name "SINAPI Bot"
          git add lib/sinapi-data.json
          git diff --staged --quiet || git commit -m "chore: SINAPI Bahia atualizado $(date '+%m/%Y')"
          git push
